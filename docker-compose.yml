version: '3.8'

services:
  crucible:
    build: .
    container_name: crucible
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production
    volumes:
      - crucible_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  crucible_data:
    driver: local
